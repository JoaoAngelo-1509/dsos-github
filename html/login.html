<!DOCTYPE html>
  <!-- DSos v1.5 — login.html (2FA OTP) -->
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' https: data: blob:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://unpkg.com; style-src 'self' 'unsafe-inline' https:; img-src 'self' data: https: blob:; connect-src 'self' https://*.supabase.co wss://*.supabase.co;">
  <title>DSos — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/login.css" />

  <style>
    /* ── MODAL 2FA ── */
    .modal-2fa-bg {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.72);
      backdrop-filter: blur(10px);
      z-index: 200;
      align-items: center;
      justify-content: center;
      animation: fadeIn .2s ease;
    }
    .modal-2fa-bg.open { display: flex; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .modal-2fa {
      background: var(--gray-card);
      border: 2px solid var(--gray-border);
      border-radius: 8px;
      width: min(380px, 94vw);
      padding: 32px 30px 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      box-shadow: 0 16px 60px rgba(0,0,0,.45);
      animation: cardIn .3s cubic-bezier(.22,1,.36,1) both;
      position: relative;
    }

    .modal-2fa-ico {
      width: 52px; height: 52px;
      border-radius: 50%;
      background: rgba(192,23,26,.1);
      border: 2px solid rgba(192,23,26,.25);
      display: flex; align-items: center; justify-content: center;
      color: var(--red);
    }

    .modal-2fa-title {
      font-size: .95rem;
      font-weight: 700;
      color: var(--text);
      text-align: center;
    }

    .modal-2fa-sub {
      font-size: .72rem;
      color: var(--text-muted);
      text-align: center;
      line-height: 1.6;
      margin-top: -8px;
    }

    .modal-2fa-sub strong {
      color: var(--text);
    }

    /* Dígitos OTP */
    .otp-inputs {
      display: flex;
      gap: 8px;
      justify-content: center;
    }
    .otp-digit {
      width: 44px; height: 54px;
      text-align: center;
      font-size: 1.4rem;
      font-weight: 700;
      font-family: 'Sora', monospace;
      color: var(--text);
      background: var(--gray-input);
      border: 2px solid var(--gray-border);
      border-radius: 6px;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      caret-color: var(--red);
    }
    .otp-digit:focus {
      border-color: var(--red);
      box-shadow: 0 0 0 3px rgba(192,23,26,.15);
    }

    .otp-timer {
      font-size: .65rem;
      color: var(--text-muted);
      text-align: center;
    }

    .otp-erro {
      width: 100%;
      background: #fde8e8;
      border: 1px solid #f5b4b4;
      border-radius: 4px;
      padding: 8px 12px;
      font-size: .78rem;
      color: #9b1c1c;
      display: none;
      text-align: center;
    }
    [data-theme="dark"] .otp-erro {
      background: rgba(192,23,26,.15);
      border-color: rgba(192,23,26,.35);
      color: #ff8888;
    }
    .otp-erro.visivel { display: block; }

    .btn-otp-confirmar {
      width: 100%; padding: 13px;
      background: var(--red); color: #fff;
      border: none; border-radius: 4px;
      font-family: inherit; font-size: .9rem; font-weight: 700;
      cursor: pointer; transition: background .2s;
    }
    .btn-otp-confirmar:hover { background: #910305; }
    .btn-otp-confirmar:disabled { opacity: .55; cursor: not-allowed; }

    .btn-otp-reenviar {
      background: none;
      border: 1.5px solid var(--gray-border);
      border-radius: 4px;
      padding: 7px 16px;
      font-family: inherit; font-size: .72rem;
      color: var(--text-muted);
      cursor: pointer;
      transition: all .2s;
    }
    .btn-otp-reenviar:hover:not(:disabled) {
      border-color: var(--red); color: var(--red);
    }
    .btn-otp-reenviar:disabled { opacity: .5; cursor: not-allowed; }

    .btn-otp-cancelar {
      background: none; border: none;
      font-family: inherit; font-size: .68rem;
      color: var(--text-muted); cursor: pointer;
      text-decoration: underline; padding: 0;
    }
    .btn-otp-cancelar:hover { color: var(--red); }

    .otp-divider {
      width: 100%; height: 1px;
      background: var(--gray-border); opacity: .4;
    }

    .otp-actions {
      display: flex; flex-direction: column;
      align-items: center; gap: 10px;
      width: 100%;
    }

    @media (max-width: 420px) {
      .modal-2fa { padding: 24px 18px 20px; }
      .otp-digit { width: 38px; height: 48px; font-size: 1.2rem; }
    }
  </style>
</head>
<body>

<div class="bg"></div>

<button class="btn-tema" id="btn-tema" onclick="toggleTema()" title="Alternar modo claro/escuro">
  <svg id="ico-tema" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
</button>

<!-- CARD DE LOGIN -->
<div class="card">
  <p class="boas-vindas">Bem-vindo ao DSos — Sistema de HelpDesk Escolar. Faça login com as credenciais do seu PC.</p>

  <div class="field">
    <input id="nome" type="text" placeholder="Seu nome..." autocomplete="off" spellcheck="false" />
  </div>

  <div class="divisor"><span>credenciais do PC</span></div>

  <div class="field">
    <input id="usuario" type="text" placeholder="Usuário do PC..." autocomplete="off" spellcheck="false" />
  </div>

  <div class="field" style="position:relative;">
    <input id="senha" type="password" placeholder="Senha..." autocomplete="off" style="padding-right: 46px;" />
    <button type="button" onclick="toggleSenha()" id="btn-olho"
      style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;padding:0;color:var(--text-muted);">
      <svg id="icone-olho" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>
    </button>
  </div>

  <div class="erro" id="erro">Usuário ou senha incorretos.</div>

  <button class="btn-entrar" id="btn" onclick="entrar()">
    <span>Entrar</span>
  </button>

  <img class="logo" src="../images/Logo.png" alt="Centro Paula Souza" />

  <a class="ajuda" href="#" onclick="ajuda(event)">ajuda sobre login</a>
</div>

<!-- MODAL 2FA -->
<div class="modal-2fa-bg" id="modal-2fa">
  <div class="modal-2fa">

    <div class="modal-2fa-ico">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="5" y="11" width="14" height="10" rx="2"/>
        <path d="M8 11V7a4 4 0 0 1 8 0v4"/>
        <circle cx="12" cy="16" r="1" fill="currentColor"/>
      </svg>
    </div>

    <div class="modal-2fa-title">Verificação em Dois Fatores</div>

    <p class="modal-2fa-sub">
      Enviamos um código de 6 dígitos para<br>
      <strong id="otp-email-destino">seu email cadastrado</strong>.<br>
      Válido por <strong>10 minutos</strong>.
    </p>

    <div class="otp-inputs">
      <input class="otp-digit" type="text" inputmode="numeric" maxlength="1" autocomplete="one-time-code" />
      <input class="otp-digit" type="text" inputmode="numeric" maxlength="1" />
      <input class="otp-digit" type="text" inputmode="numeric" maxlength="1" />
      <input class="otp-digit" type="text" inputmode="numeric" maxlength="1" />
      <input class="otp-digit" type="text" inputmode="numeric" maxlength="1" />
      <input class="otp-digit" type="text" inputmode="numeric" maxlength="1" />
    </div>

    <div class="otp-erro" id="otp-erro"></div>

    <button class="btn-otp-confirmar" id="btn-otp-confirmar" onclick="verificarOTP()">
      Confirmar
    </button>

    <div class="otp-divider"></div>

    <div class="otp-actions">
      <button class="btn-otp-reenviar" id="btn-otp-reenviar" onclick="reenviarOTP()" disabled>
        Reenviar (60s)
      </button>
      <button class="btn-otp-cancelar" onclick="cancelarOTP()">
        Voltar ao login
      </button>
    </div>

  </div>
</div>

<script type="module" src="../js/auth.js"></script>
</body>
</html>
